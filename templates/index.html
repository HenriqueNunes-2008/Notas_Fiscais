<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Almoxarifado - Google Sheets Sync</title>
    <style>
        /* Configuração do Fundo com Gradiente */
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(90deg, #0093dd 30%, #5b2fa6);
            color: #0f172a;
            padding-top: 160px;
            padding-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        /* Topbar Estilizada */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px;
            background: #ffffff;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            border-radius: 0 0 50px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .logo-fixed {
            height: 60px;
            transform: scale(2.25);
            margin-left: 5%;
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 32px;
            font-size: 13px;
            color: #1e3a8a;
            line-height: 1.4;
            text-align: right;
        }

        /* Container do Formulário */
        .form-container {
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 650px;
        }

        h2 {
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        label {
            display: block;
            margin-bottom: 5px;
            color: #475569;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0093dd;
            box-shadow: 0 0 0 3px rgba(0, 147, 221, 0.1);
        }

        /* Botões */
        button {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        .btn-add { background: #1e3a8a; font-size: 14px; padding: 10px; }
        .btn-save { 
            background: linear-gradient(135deg, #27ae60, #2ecc71); 
            font-size: 18px;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            margin-top: 25px;
        }

        .btn-sheets {
            background-color: #0f9d58;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        button:hover { transform: translateY(-2px); opacity: 0.9; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        /* Mensagens de Status */
        #status-message {
            display: none;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <img src="/static/LogoFlexcolor2.png" class="logo-fixed" alt="Logo">
        <div class="header-info">
            <div class="address">
                R. José Antônio Valadares, 285 – Vila Liviero<br>
                São Paulo – SP. CEP: 04185-020
            </div>
            <div class="contact">
                <span class="email">comercial@soukure.com.br</span><br>
                <span class="phone">(11) 2372-7444</span>
            </div>
        </div>
    </div>

    <div class="form-container">
        <h2>Entrada de Notas - Google Sheets</h2>
        
        <div id="status-message"></div>
        
        <form id="nota-form">
            <div class="form-grid" style="margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 20px;">
                <div>
                    <label>Data:</label>
                    <input type="date" name="data" required>
                </div>
                <div>
                    <label>Nº Nota:</label>
                    <input type="text" name="n_nota">
                </div>
                <div class="full-width">
                    <label>Fornecedor:</label>
                    <input type="text" name="fornecedor" required>
                </div>
            </div>

            <div id="lista-materiais">
                <div class="material-item" style="background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0;">
                    <div class="form-grid">
                        <div class="full-width">
                            <label>Material:</label>
                            <input type="text" name="material[]" required>
                        </div>
                        <div>
                            <label>Quantidade:</label>
                            <input type="number" step="0.01" name="quantidade[]" required>
                        </div>
                        <div>
                            <label>Valor Unitário (R$):</label>
                            <input type="number" step="0.01" name="valor_unitario[]" required>
                        </div>
                        <div>
                            <label>Unidade:</label>
                            <input type="text" name="unidade[]" placeholder="KG, UN, M">
                        </div>
                        <div>
                            <label>Projeto:</label>
                            <input type="text" name="projeto[]">
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" class="btn-add" onclick="adicionarMaterial()">+ ADICIONAR OUTRO MATERIAL</button>
            
            <button type="submit" id="btn-cadastrar" class="btn-save">
                🚀 FINALIZAR E SALVAR NA NUVEM
            </button>

            <a href="https://docs.google.com/spreadsheets/d/1o_K4yeb7Up1f7jtmwryG2PYNynRhILfbzHaJRE2hJg0/edit?gid=0#gid=0" target="_blank" class="btn-sheets">
                🟢 ABRIR PLANILHA EM TEMPO REAL
            </a>
        </form>
    </div>

<script>
    function adicionarMaterial() {
        const container = document.getElementById('lista-materiais');
        const novoItem = document.createElement('div');
        novoItem.className = 'material-item';
        novoItem.style = "background: #f8fafc; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #e2e8f0; position: relative;";
        
        novoItem.innerHTML = `
            <button type="button" onclick="this.parentElement.remove()" style="position: absolute; right: 10px; top: 10px; width: auto; padding: 5px 10px; background: #ef4444; font-size: 12px; color: white; border: none; border-radius: 5px; cursor: pointer;">X</button>
            <div class="form-grid">
                <div class="full-width">
                    <label>Material:</label>
                    <input type="text" name="material[]" required>
                </div>
                <div>
                    <label>Quantidade:</label>
                    <input type="number" step="0.01" name="quantidade[]" required>
                </div>
                <div>
                    <label>Valor Unitário (R$):</label>
                    <input type="number" step="0.01" name="valor_unitario[]" required>
                </div>
                <div>
                    <label>Unidade:</label>
                    <input type="text" name="unidade[]" placeholder="KG, UN, M">
                </div>
                <div>
                    <label>Projeto:</label>
                    <input type="text" name="projeto[]">
                </div>
            </div>
        `;
        container.appendChild(novoItem);
    }

    document.getElementById('nota-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btn-cadastrar');
        const statusDiv = document.getElementById('status-message');
        const formData = new FormData(this);
        
        btn.disabled = true;
        btn.innerText = "Enviando para o Google Sheets...";
        statusDiv.style.display = 'none';

        fetch(window.location.origin + '/adicionar', { 
            method: 'POST', 
            body: formData 
        })
        .then(response => response.json())
        .then(data => {
            statusDiv.style.display = 'block';
            statusDiv.innerText = data.message;
            
            if (data.status === 'success') {
                statusDiv.style.backgroundColor = '#d4edda';
                statusDiv.style.color = '#155724';
                
                this.reset();
                document.getElementById('lista-materiais').innerHTML = '';
                adicionarMaterial(); 
                window.scrollTo(0,0);
            } else {
                statusDiv.style.backgroundColor = '#f8d7da';
                statusDiv.style.color = '#721c24';
            }
        })
        .catch(error => {
            console.error("Erro:", error);
            statusDiv.style.display = 'block';
            statusDiv.innerText = "❌ Erro ao conectar com o servidor.";
            statusDiv.style.backgroundColor = '#f8d7da';
            statusDiv.style.color = '#721c24';
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = "🚀 FINALIZAR E SALVAR NA NUVEM";
        });
    });
</script>

</body>
</html>
